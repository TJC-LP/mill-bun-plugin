<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mill Polyglot Demo</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 40px auto; padding: 0 16px; }
    h1 { color: #333; }
    h2 { color: #555; font-size: 1.1em; margin-top: 24px; }
    section { margin-bottom: 20px; }
    .row { display: flex; gap: 8px; margin-bottom: 8px; }
    input { flex: 1; padding: 8px; font-size: 14px; }
    button { padding: 8px 16px; cursor: pointer; }
    .result { padding: 8px 12px; background: #f5f5f5; border-radius: 6px; min-height: 20px; margin-top: 4px; }
    .valid { color: #2a7; }
    .invalid { color: #c33; }
    code { background: #eee; padding: 2px 5px; border-radius: 3px; font-size: 0.9em; }
  </style>
</head>
<body>
  <div id="app">Loading...</div>
  <script src="/static/client.js"></script>
</body>
</html>
