name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/coursier
            ~/.ivy2/cache
          key: ${{ runner.os }}-coursier-${{ hashFiles('**/build.mill', '**/.mill-version') }}
          restore-keys: |
            ${{ runner.os }}-coursier-

      - name: Cache Mill
        uses: actions/cache@v4
        with:
          path: ~/.mill
          key: ${{ runner.os }}-mill-${{ hashFiles('**/build.mill', '**/.mill-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Fetch annotated tags
        run: git fetch --tags --force

      - name: Extract version and tag message
        id: version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Publishing version: $TAG_VERSION"

          if ! [[ "$TAG_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Tag must be a valid semver version such as v0.1.0 or v0.1.0-RC1"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

          TAG_MESSAGE="$(git tag -l --format='%(contents)' "v$TAG_VERSION" 2>/dev/null || true)"
          if [ -n "$TAG_MESSAGE" ]; then
            {
              echo "body<<EOF"
              echo "$TAG_MESSAGE"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compile
        env:
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}
        run: ./mill --no-server millbun.compile

      - name: Unit tests
        env:
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}
        run: ./mill --no-server millbun.test

      - name: Integration tests
        env:
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}
        run: ./mill --no-server millbun.integration

      - name: Reset cached publish metadata
        env:
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}
        run: ./mill --no-server clean millbun.publishVersion millbun.publishArtifacts

      - name: Verify publish setup
        env:
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}
        run: |
          ./mill --no-server show millbun.publishVersion
          ./mill --no-server show millbun.publishArtifacts

      - name: Publish to Maven Central
        env:
          PUBLISH_VERSION: ${{ steps.version.outputs.version }}
          MILL_SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          MILL_SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          MILL_PGP_SECRET_BASE64: ${{ secrets.PGP_SECRET }}
          MILL_PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
        run: ./mill --no-server -i mill.javalib.SonatypeCentralPublishModule/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.version.outputs.body }}
          draft: false
          generate_release_notes: ${{ steps.version.outputs.has_notes != 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
